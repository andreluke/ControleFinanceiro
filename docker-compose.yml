services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: financeapp
      POSTGRES_PASSWORD: financeapp
      POSTGRES_DB: financeapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeapp -d financeapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://financeapp:financeapp@db:5432/financeapp
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
